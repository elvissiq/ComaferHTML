<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Opções de Entrega</title>
    <script id="webchannel-script"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #f0f2f5; padding: 15px; text-align: center; user-select: none; margin:0; }
        h2 { color: #2c3e50; margin: 8px 0; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 10px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; border-top: 8px solid #ccc; cursor: pointer; transition: 0.2s; text-align: left; display: flex; flex-direction: column; min-height: 200px; }
        .card:hover { transform: translateY(-2px); border-color: #ddd; }
        .card.selected { border-color: #2ecc71; border-top-color: #2ecc71; background: #fafff9; }
        .title { font-size: 14px; font-weight: bold; color: #34495e; }
        .price { font-size: 22px; color: #27ae60; font-weight: bold; margin: 5px 0; }
        .date-sug { color: #1976d2; font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .manual-date { margin: 5px 0; padding: 5px; border-top: 1px dashed #eee; }
        label { font-size: 10px; color: #888; display: block; }
        input[type='date'] { width: 100%; padding: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        .conf-btn { display: none; width: 90%; background: #2ecc71; color: white; text-align: center; padding: 8px; border-radius: 5px; font-weight: bold; margin: 10px auto 0 auto; cursor: pointer; border: none; font-size: 12px; }
        .selected .conf-btn { display: block; }
        .desc { font-size: 10px; color: #7f8c8d; line-height: 1.2; margin-top: 5px; flex-grow: 1; }
    </style>
</head>
<body>
    <h2>Escolha a Modalidade de Entrega</h2>
    <div class='grid' id="grid-opcoes">
        </div>

    <script>
        // 1. Captura os parâmetros passados na URL (?peso=X&zona=Y&port=Z)
        const urlParams = new URLSearchParams(window.location.search);
        const nPort     = urlParams.get('port');
        const protheusUrl = window.location.protocol + "//" + window.location.hostname + (window.location.port ? ":" + window.location.port : "");

        // 2. Carrega dinamicamente o twebchannel.js baseado na URL do Protheus que está acessando
        document.getElementById('webchannel-script').src = `${protheusUrl}/twebchannel.js`;

        // 3. Inicializa o canal de comunicação quando o script carregar
        window.onload = function() {
            if (typeof twebchannel !== 'undefined') {
                // Passa a porta do WebSocket recebida via Query String
                twebchannel.connect(parseInt(nPort));

                twebchannel.advplToJs = function(key, val) { 
                    if(key === 'alert') alert(val); 
                    if(key === 'render') renderCards(JSON.parse(val)); // Recebe a matriz do AdvPL
                };
            } else {
                alert("Erro ao carregar o canal de comunicação com o Protheus (twebchannel).");
            }
        };

        // 4. Renderiza os cards recebidos dinamicamente do Protheus
        function renderCards(aOpcoes) {
            const grid = document.getElementById('grid-opcoes');
            grid.innerHTML = ""; // Limpa a grid

            aOpcoes.forEach((opcao, index) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.borderTopColor = opcao.cor;
                card.setAttribute('onclick', 'selectCard(this)');

                card.innerHTML = `
                    <div class="title">${opcao.modalidade}</div>
                    <div class="price">R$ ${opcao.valor}</div>
                    <div class="date-sug">Previsão sugerida: ${opcao.dataSugFmt}</div>
                    <div class="manual-date" onclick="event.stopPropagation()">
                        <label>Outra data (não anterior):</label>
                        <input type="date" id="dtM${index}" min="${opcao.dataISO}" onchange="validDt(this, '${opcao.dataISO}')">
                    </div>
                    <div class="desc">${opcao.descricao}</div>
                    <div class="conf-btn" onclick="confirmOp(event, '${opcao.valorReal}', '${opcao.dataISO}', 'dtM${index}')">Confirmar Opção</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectCard(el) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function validDt(el, min) {
            var d = new Date(el.value); var day = d.getUTCDay();
            if(day === 0) { alert('Domingos não são válidos para entrega.'); el.value = ''; return; }
            if(el.value && el.value < min) { alert('A data não pode ser menor que a sugerida.'); el.value = ''; }
        }
        
        function confirmOp(event, val, dtSug, inputId) {
            event.stopPropagation();
            var manual = document.getElementById(inputId).value;
            var dtFinal = (manual !== '') ? manual : dtSug;
            twebchannel.jsToAdvpl('SAVE_DIAS', val + '|' + dtFinal);
        }
    </script>
</body>
</html>
