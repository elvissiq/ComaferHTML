<script>
        // Captura os parâmetros passados na URL (?peso=X&zona=Y&port=Z)
        const urlParams = new URLSearchParams(window.location.search);
        const nPort     = urlParams.get('port');

        window.onload = function() {
            // Verifica se o twebchannel existe (Rodando por dentro do Protheus)
            if (typeof twebchannel !== 'undefined' || window.qt || navigator.userAgent.includes("QtWebEngine")) {
                
                // Inicializa o canal na porta dinâmica do WebSocket gerada no Cloud
                twebchannel.connect(parseInt(nPort));
                
                // Aguarda o gatilho enviado pelo AdvPL (fSendToJs)
                twebchannel.advplToJs = function(key, val) { 
                    if(key === 'alert') alert(val); 
                    if(key === 'render') {
                        // Injeta os dados REAIS consultados na ZZ4 e ZZ5 pelo Protheus
                        renderCards(JSON.parse(val)); 
                    }
                };
            } else {
                // APENAS PARA SEU TESTE NO NAVEGADOR: Dados mockados fictícios
                console.log("Modo de teste manual externo ativo.");
                const dadosTeste = [
                    {"modalidade":"[Teste] Normal","valor":"0,01","valorReal":"0.01","descricao":"Transporte padrão econômico","cor":"#3498db","dataSugFmt":"10/07/2026","dataISO":"2026-07-10"},
                    {"modalidade":"[Teste] Expressa 24h","valor":"150,00","valorReal":"150.00","descricao":"Prioridade total","cor":"#e74c3c","dataSugFmt":"26/06/2026","dataISO":"2026-06-26"}
                ];
                renderCards(dadosTeste);
            }
        };

        // Função que desenha os cards dinamicamente na tela recebendo a consulta
        function renderCards(aOpcoes) {
            const grid = document.getElementById('grid-opcoes');
            grid.innerHTML = ""; // Limpa os dados antigos da tela

            aOpcoes.forEach((opcao, index) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.borderTopColor = opcao.cor;
                card.setAttribute('onclick', 'selectCard(this)');

                card.innerHTML = `
                    <div class="title">${opcao.modalidade}</div>
                    <div class="price">R$ ${opcao.valor}</div>
                    <div class="date-sug">Previsão sugerida: ${opcao.dataSugFmt}</div>
                    <div class="manual-date" onclick="event.stopPropagation()">
                        <label>Outra data (não anterior):</label>
                        <input type="date" id="dtM${index}" min="${opcao.dataISO}" onchange="validDt(this, '${opcao.dataISO}')">
                    </div>
                    <div class="desc">${opcao.descricao}</div>
                    <div class="conf-btn" onclick="confirmOp(event, '${opcao.valorReal}', '${opcao.dataISO}', 'dtM${index}')">Confirmar Opção</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectCard(el) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function validDt(el, min) {
            var d = new Date(el.value); var day = d.getUTCDay();
            if(day === 0) { alert('Domingos não são válidos para entrega.'); el.value = ''; return; }
            if(el.value && el.value < min) { alert('A data não pode ser menor que a sugerida.'); el.value = ''; }
        }
        
        function confirmOp(event, val, dtSug, inputId) {
            event.stopPropagation();
            var manual = document.getElementById(inputId).value;
            var dtFinal = (manual !== '') ? manual : dtSug;
            
            if (typeof twebchannel !== 'undefined' && twebchannel.jsToAdvpl) {
                // Retorna o valor real consultado e a data escolhida de volta para o Protheus
                twebchannel.jsToAdvpl('SAVE_DIAS', val + '|' + dtFinal);
            } else {
                alert(`[Modo Teste] Enviando para o Protheus: Valor R$ ${val} | Data: ${dtFinal}`);
            }
        }
    </script>
